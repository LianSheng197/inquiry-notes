{{ define "main" }}
  <section class="hero ts-box">
    <h1 class="ts-header">{{ site.Title }}</h1>
    <p class="ts-text is-large">{{ site.Params.description }}</p>
  </section>

  <section class="section-block">
    <div class="section-heading">
      <h2 class="ts-header is-large">最新文章</h2>
      <a class="ts-button is-small is-ghost" href="{{ "posts/" | relURL }}">查看全部</a>
    </div>
    <div class="post-list">
      {{ range first 5 (where site.RegularPages "Type" "posts") }}
        {{ partial "post-card.html" . }}
      {{ end }}
    </div>
  </section>
{{ end }}
