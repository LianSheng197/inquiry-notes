{{- $src := .Get "src" -}}
{{- with .Page.Resources.GetMatch $src -}}
  {{- $src = .RelPermalink -}}
{{- end -}}
{{- $poster := .Get "poster" -}}
{{- with .Page.Resources.GetMatch $poster -}}
  {{- $poster = .RelPermalink -}}
{{- end -}}
{{- $inner := .Inner -}}
<figure class="post-media">
  <video controls preload="metadata"{{ with $poster }} poster="{{ . }}"{{ end }}>
    <source src="{{ $src | safeURL }}" type="{{ .Get "type" | default "video/mp4" }}">
    你的瀏覽器不支援 HTML5 影片播放。
  </video>
  {{ with .Get "caption" }}<figcaption>{{ . }}</figcaption>{{ end }}
</figure>
