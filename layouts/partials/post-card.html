<article class="ts-box post-card">
  {{ with .Params.date }}
    <p class="ts-text is-secondary post-meta">{{ .Format "2006-01-02" }}</p>
  {{ end }}
  <div class="post-title-row">
    <h2 class="ts-header is-large"><a href="{{ .RelPermalink }}">{{ .Title }}</a></h2>
    {{ if .Draft }}<span class="draft-badge">草稿</span>{{ end }}
  </div>
  {{ with .Params.tags }}
    <div class="tag-list">
      {{ range . }}<span class="ts-chip">{{ . }}</span>{{ end }}
    </div>
  {{ end }}
  {{ with .Description }}
    <p class="ts-text post-excerpt">{{ . }}</p>
  {{ else }}
    <p class="ts-text post-excerpt">{{ .Summary | plainify | truncate 180 "…" }}</p>
  {{ end }}
  <a class="ts-button is-small" href="{{ .RelPermalink }}">閱讀全文</a>
</article>
