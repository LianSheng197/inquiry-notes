<header class="site-header">
  <nav class="ts-container ts-navbar">
    <div class="ts-navbar-left">
      <a class="ts-text is-bold site-brand" href="{{ site.Home.RelPermalink }}">{{ site.Title }}</a>
    </div>
    <div class="site-nav-desktop ts-navbar-right">
      {{ range site.Menus.main }}
        <a class="ts-button is-ghost" href="{{ .URL }}">{{ .Name }}</a>
      {{ end }}
    </div>
    <details class="site-nav-mobile">
      <summary class="ts-button is-ghost">選單</summary>
      <nav class="site-nav-mobile-list" aria-label="行動版導覽">
        {{ range site.Menus.main }}
          <a href="{{ .URL }}">{{ .Name }}</a>
        {{ end }}
      </nav>
    </details>
  </nav>
</header>
